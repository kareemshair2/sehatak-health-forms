<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>غرفة استعلامات الدواء بقوافل الملف الصحي صناع الحياة المنوفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0f766e;
      --primary-dim: rgba(15,118,110,0.12);
      --primary-glow: rgba(15,118,110,0.08);
      --secondary: #b8944a;
      --secondary-dim: rgba(184,148,74,0.12);
      --alert: #ef4444;
      --warn: #fbbf24;
      --bg-deep: #070b18;
      --bg-surface: #0e1628;
      --bg-card: #141e36;
      --bg-card-hover: #1a2645;
      --text-primary: #e8e2d6;
      --text-secondary: #9a8e7a;
      --text-muted: #6a5f50;
      --border: rgba(184,148,74,0.1);
      --border-hover: rgba(184,148,74,0.22);
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 4px 20px rgba(0,0,0,0.25);
      --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 16px;
    }

    .page { position: relative; z-index: 2; }

    .hl { background: linear-gradient(135deg, var(--primary), #1a9e9e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .premium-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 32px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--primary), #0d5e5e);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .premium-bar .bar-icon { font-size: 0.75rem; opacity: 0.9; }
    body { padding-top: 32px; }

    .geo-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; opacity: 0.2;
    }
    .geo-bg::before {
      content: ''; position: absolute; inset: -50%;
      background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 0l14.6 44.7L120 60l-45.4 15.3L60 120 45.4 75.3 0 60l45.4-15.3z' fill='none' stroke='rgba(184,148,74,0.04)' stroke-width='0.5'/%3E%3C/svg%3E");
      background-size: 160px 160px;
      animation: geoDrift 80s linear infinite;
      opacity: 0.4;
    }
    @keyframes geoDrift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 28px 16px 20px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-dim);
      color: var(--primary);
      font-weight: 600;
      font-size: 12px;
      padding: 5px 16px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .badge::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      line-height: 1.3;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* ===== SEARCH BOX ===== */
    .search-wrap {
      max-width: 600px;
      margin: 24px auto 0;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 18px 56px 18px 24px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 17px;
      font-weight: 600;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      outline: none;
      direction: rtl;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-dim);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      opacity: 0.5;
      pointer-events: none;
    }
    .clear-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }
    .clear-btn:hover { background: var(--alert); color: #fff; }
    .clear-btn.show { display: flex; }

    /* ===== STATUS BAR ===== */
    .status-bar {
      max-width: 900px;
      margin: 14px auto 0;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESULTS AREA ===== */
    #results {
      max-width: 900px;
      margin: 18px auto 40px;
    }

    /* ===== TABLE WRAPPER ===== */
    .table-wrap {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .result-count {
      padding: 14px 20px;
      font-size: 13px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-count strong { color: var(--primary); font-size: 16px; }

    /* DESKTOP TABLE */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th {
      background: var(--bg-card);
      color: var(--primary);
      font-weight: 700;
      font-size: 12px;
      padding: 12px 14px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(184,148,74,0.08);
      vertical-align: top;
      line-height: 1.5;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--primary-glow); }

    .drug-name { font-weight: 700; color: var(--text-primary); font-size: 15px; }
    .active-ingredient { color: var(--secondary); font-size: 13px; }

    /* expiry badge */
    .badge-expiry {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-green  { background: var(--primary-dim); color: var(--primary); }
    .badge-yellow { background: rgba(251,191,36,0.15); color: var(--warn); }
    .badge-red    { background: rgba(239,68,68,0.15); color: var(--alert); }

    .form-chip {
      background: var(--secondary-dim);
      color: var(--secondary);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      display: inline-block;
    }
    .center-text { color: var(--text-muted); font-size: 13px; }

    /* MOBILE CARDS (hidden on desktop) */
    .mobile-cards { display: none; }

    .drug-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      animation: fadeUp 0.3s ease;
    }
    .drug-card:last-child { margin-bottom: 0; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }
    .card-name { font-weight: 900; font-size: 17px; color: var(--text-primary); }
    .card-ingredient { color: var(--secondary); font-size: 13px; margin-top: 2px; }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card-item label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .card-item span { font-size: 14px; font-weight: 600; }
    .card-center {
      grid-column: 1/-1;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 2px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .card-center strong { color: var(--text-primary); }

    /* EMPTY / ERROR */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 8px; }

    /* RESPONSIVE */
    @media (max-width: 680px) {
      .data-table, .data-table thead, .data-table tbody,
      .data-table th, .data-table td, .data-table tr {
        display: none;
      }
      .result-count { display: flex !important; }
      .mobile-cards { display: block; padding: 14px; }
    }
  </style>
</head>
<body>

<div class="premium-bar">
  <span class="bar-icon">◈</span>
  <span>منظومة الملف الصحي — صناع الحياة المنوفية</span>
</div>
<div class="geo-bg"></div>
<div class="grain"></div>

<div class="page">

<header>
  <div class="logo-frame" style="display:flex;justify-content:center;padding:5px;border:1px solid var(--border);border-radius:12px;background:rgba(14,22,40,0.6);margin-bottom:12px;">
    <img src="logo.jpg" alt="صناع الحياة" style="height:70px;width:auto;border-radius:8px;display:block;">
  </div>
  <div class="badge">◈ الملف الصحي — نظام الاستعلامات</div>
  <h1>غرفة استعلامات <span class="hl">القوافل</span></h1>
  <p class="subtitle">الدواء بقوافل الملف الصحي — صناع الحياة المنوفية</p>
</header>

<div class="search-wrap">
  <input
    type="search"
    class="search-input"
    id="searchInput"
    placeholder="اكتب اسم الدواء..."
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
  />
  <span class="search-icon">🔍</span>
  <button class="clear-btn" id="clearBtn" title="مسح">✕</button>
</div>

<div class="status-bar">
  <div class="spinner" id="spinner"></div>
  <span id="statusText">اكتب على الأقل 4 حروف للبحث</span>
</div>

<div id="results"></div>

</div><!-- /.page -->

<script>
// =========================================================
// CONFIG — تأكد من صحة البيانات دي
// =========================================================
const SHEET_ID   = '1HddJ7VRSfL6iH1JtiSFx4SR09VfSaMdbUgZGo-4AqHE';
const TAB_NAME   = 'convoy';          // ← اسم التاب بالظبط
const START_COL  = 'A';
const END_COL    = 'H';
// عمود البيانات:  A=اسم الدواء B=المادة الفعالة C=الشكل الدوائي D=علبة/شريط E=كمية F=تاريخ الانتهاء G=عدد الشهور H=المركز
// صف البداية (بعد الهيدر)
const DATA_START_ROW = 2;
// =========================================================

const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(TAB_NAME)}&range=${START_COL}${DATA_START_ROW}:${END_COL}`;

let allData    = [];
let debounceT  = null;

// ---- Fetch all data once ----
async function loadData() {
  setStatus('⏳ جاري تحميل البيانات...', true);
  try {
    const res  = await fetch(API_URL);
    const text = await res.text();
    // Google wraps response in /*O_o*/\ngoogle.visualization.Query.setResponse(...)
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    const rows = json.table.rows;

    allData = rows
      .map(r => {
        const c = r.c;
        const val = (i) => (c[i] && c[i].v !== null && c[i].v !== undefined) ? String(c[i].v).trim() : '';
        const fmtVal = (i) => (c[i] && c[i].f) ? String(c[i].f).trim() : val(i);
        return {
          name:        val(0),
          ingredient:  val(1),
          form:        val(2),
          packType:    val(3),
          qty:         val(4),
          expiry:      fmtVal(5),
          months:      val(6),
          center:      val(7),
        };
      })
      .filter(r => r.name);

    setStatus(`✅ تم تحميل ${allData.length} صنف — ابدأ البحث`, false);
  } catch (e) {
    console.error(e);
    setStatus('❌ خطأ في تحميل البيانات — تأكد من إعدادات الشيت', false);
  }
}

function setStatus(msg, loading) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').classList.toggle('active', loading);
}

// ---- Search ----
function search(q) {
  q = q.trim().toLowerCase();
  if (q.length < 4) {
    document.getElementById('results').innerHTML = '';
    setStatus('اكتب على الأقل 4 حروف للبحث', false);
    return;
  }

  const hits = allData.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.ingredient.toLowerCase().includes(q)
  );

  renderResults(hits, q);
}

// ---- Render ----
function renderResults(data, q) {
  const container = document.getElementById('results');

  if (data.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔭</div>
        <h3>لا توجد نتائج</h3>
        <p>لم يُوجد دواء يطابق "<strong>${q}</strong>"</p>
      </div>`;
    setStatus('لا توجد نتائج', false);
    return;
  }

  setStatus(`${data.length} نتيجة`, false);

  // Build desktop table rows
  const tableRows = data.map(r => `
    <tr>
      <td>
        <div class="drug-name">${highlight(r.name, q)}</div>
        <div class="active-ingredient">${highlight(r.ingredient, q)}</div>
      </td>
      <td><span class="form-chip">${r.form}</span></td>
      <td>${r.packType}</td>
      <td><strong>${r.qty}</strong></td>
      <td>${r.expiry}</td>
      <td>${monthsBadge(r.months)}</td>
      <td class="center-text">${r.center}</td>
    </tr>
  `).join('');

  // Build mobile cards
  const mobileCards = data.map(r => `
    <div class="drug-card">
      <div class="card-header">
        <div>
          <div class="card-name">${highlight(r.name, q)}</div>
          <div class="card-ingredient">${highlight(r.ingredient, q)}</div>
        </div>
        ${monthsBadge(r.months)}
      </div>
      <div class="card-grid">
        <div class="card-item">
          <label>الشكل الدوائي</label>
          <span class="form-chip">${r.form}</span>
        </div>
        <div class="card-item">
          <label>علبة / شريط</label>
          <span>${r.packType}</span>
        </div>
        <div class="card-item">
          <label>الكمية</label>
          <span>${r.qty}</span>
        </div>
        <div class="card-item">
          <label>تاريخ الانتهاء</label>
          <span>${r.expiry}</span>
        </div>
        <div class="card-center">
          📍 المركز: <strong>${r.center}</strong>
        </div>
      </div>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <div class="result-count">
        <span>نتائج البحث عن "<strong>${q}</strong>"</span>
        <strong>${data.length}</strong>
      </div>
      <!-- Desktop table -->
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>اسم الدواء / المادة الفعالة</th>
              <th>الشكل الدوائي</th>
              <th>علبة/شريط</th>
              <th>الكمية</th>
              <th>تاريخ الانتهاء</th>
              <th>الشهور المتبقية</th>
              <th>المركز</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <!-- Mobile cards -->
      <div class="mobile-cards">${mobileCards}</div>
    </div>
  `;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:var(--primary-dim);color:var(--primary);border-radius:3px;padding:0 2px">$1</mark>');
}

function monthsBadge(m) {
  const n = parseFloat(m);
  if (isNaN(n)) return `<span class="badge-expiry badge-yellow">${m || '—'}</span>`;
  if (n <= 0)   return `<span class="badge-expiry badge-red">منتهي</span>`;
  if (n <= 3)   return `<span class="badge-expiry badge-red">${m} شهر ⚠️</span>`;
  if (n <= 6)   return `<span class="badge-expiry badge-yellow">${m} شهر</span>`;
  return             `<span class="badge-expiry badge-green">${m} شهر</span>`;
}

// ---- Input events ----
const input    = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  const val = input.value;
  clearBtn.classList.toggle('show', val.length > 0);
  clearTimeout(debounceT);
  debounceT = setTimeout(() => search(val), 280);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('show');
  document.getElementById('results').innerHTML = '';
  setStatus('اكتب على الأقل 4 حروف للبحث', false);
  input.focus();
});

// ---- Start ----
loadData();
</script>

</body>
</html>
